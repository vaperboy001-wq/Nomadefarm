<!DOCTYPE html><html lang="mn">
<head>
<meta charset="UTF-8">
<title>3-р сарын 8</title><style>

body{
margin:0;
height:100vh;
background:black;
color:white;
font-family:-apple-system,BlinkMacSystemFont,sans-serif;
overflow:hidden;
}

/* iphone notification */

.notification{
position:absolute;
top:20px;
right:20px;
background:white;
color:black;
padding:14px 20px;
border-radius:15px;
width:260px;
box-shadow:0 5px 20px rgba(0,0,0,0.5);
cursor:pointer;
animation:slide 1s;
}

@keyframes slide{
from{transform:translateY(-50px);opacity:0}
to{transform:translateY(0);opacity:1}
}

.title{font-weight:bold}
.sub{font-size:14px;opacity:0.7}

/* message */

.message{
display:none;
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
text-align:center;
}

/* center heart */

.bigHeart{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
font-size:120px;
animation:heartBoom 2s ease-out forwards;
}

@keyframes heartBoom{
0%{transform:translate(-50%,-50%) scale(0)}
70%{transform:translate(-50%,-50%) scale(2)}
100%{transform:translate(-50%,-50%) scale(3);opacity:0}
}

/* flowers */

.flower{
position:absolute;
font-size:30px;
animation:rise 7s linear infinite;
}

@keyframes rise{
0%{transform:translateY(100vh);opacity:1}
100%{transform:translateY(-120vh);opacity:0}
}

/* fireworks */

.fire{
position:absolute;
width:4px;
height:4px;
background:white;
border-radius:50%;
animation:fire 2s linear forwards;
}

@keyframes fire{
0%{opacity:1}
100%{transform:translateY(-300px);opacity:0}
}

</style></head><body><div id="notify" class="notification" onclick="openMsg()">
<div class="title">Messages</div>
<div class="sub">Алтаншагай — Tap to open</div>
</div><div id="msg" class="message"><h1>🌸3 сарын 8🌸</h1><p>
Есөн эрдэнэ чамд олон улсын эмэгтэйчүүдийн баярын мэнд хүргэе. 🌹
</p><p>Алтаншагай-гаас </p></div><script>

function openMsg(){
document.getElementById("notify").style.display="none";
document.getElementById("msg").style.display="block";
explodeHeart();
}

/* BIG HEART */

function explodeHeart(){
const heart=document.createElement("div");
heart.className="bigHeart";
heart.innerHTML="❤️";
document.body.appendChild(heart);

setTimeout(()=>heart.remove(),2000);
}

/* flowers rising */

function flower(){
const f=document.createElement("div");
f.className="flower";

const arr=["🌹","🌷","🌸","💐"];
f.innerHTML=arr[Math.floor(Math.random()*arr.length)];

f.style.left=Math.random()*100+"vw";

document.body.appendChild(f);

setTimeout(()=>f.remove(),7000);
}

setInterval(flower,400);

/* fireworks */

function firework(){
for(let i=0;i<30;i++){
const f=document.createElement("div");
f.className="fire";

f.style.left=Math.random()*100+"vw";
f.style.top="80vh";

document.body.appendChild(f);

setTimeout(()=>f.remove(),2000);
}
}

setInterval(firework,2000);

</script></body>
</html>
