<!DOCTYPE html><html lang="mn">
<head>
<meta charset="UTF-8">
<title>3-р сарын 8</title><style>

body{
margin:0;
height:100vh;
background:black;
font-family:-apple-system,BlinkMacSystemFont,sans-serif;
overflow:hidden;
color:white;
}

/* notification */

.notification{
position:absolute;
top:25px;
right:25px;
background:white;
color:black;
padding:20px 25px;
border-radius:18px;
width:300px;
box-shadow:0 10px 25px rgba(0,0,0,0.4);
cursor:pointer;
animation:slide 0.8s;
}

@keyframes slide{
from{transform:translateY(-60px);opacity:0}
to{transform:translateY(0);opacity:1}
}

.title{
font-weight:bold;
font-size:18px;
}

.sub{
font-size:16px;
opacity:0.8;
}

/* message */

.message{
display:none;
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
text-align:center;
width:80%;
}

/* title */

.title38{
font-size:50px;
color:#ff4da6;
white-space:nowrap;
letter-spacing:3px;
text-shadow:0 0 15px #ff4da6,0 0 25px #ff7eb3;
}

/* message text */

.msgText{
font-size:24px;
margin-top:15px;
}

/* sender */

.from{
font-size:22px;
margin-top:15px;
}

/* big heart */

.bigHeart{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
font-size:150px;
animation:boom 2s forwards;
}

@keyframes boom{
0%{transform:translate(-50%,-50%) scale(0)}
60%{transform:translate(-50%,-50%) scale(2)}
100%{transform:translate(-50%,-50%) scale(3);opacity:0}
}

/* flowers */

.flower{
position:absolute;
font-size:32px;
animation:rise 8s linear infinite;
}

@keyframes rise{
0%{transform:translateY(100vh)}
100%{transform:translateY(-120vh);opacity:0}
}

/* hearts */

.heart{
position:absolute;
font-size:26px;
animation:heartUp 6s linear forwards;
}

@keyframes heartUp{
0%{transform:translateY(0)}
100%{transform:translateY(-450px);opacity:0}
}

/* fireworks */

.fire{
position:absolute;
width:6px;
height:6px;
background:white;
border-radius:50%;
animation:fire 2s linear forwards;
}

@keyframes fire{
0%{opacity:1}
100%{transform:translateY(-350px);opacity:0}
}

</style></head><body><div id="notify" class="notification" onclick="openMsg()"><div class="title">Messages</div>
<div class="sub">Алтаншагай — Tap to open</div></div><div id="msg" class="message"><h1 class="title38">🌸 3-р сарын 8 🌸</h1><p class="msgText">
Есөн эрдэнэ чамд олон улсын эмэгтэйчүүдийн баярын мэнд хүргэе. 🌹
</p><p class="from">Алтаншагай-гаас 💌</p></div><script>

function openMsg(){
document.getElementById("notify").style.display="none";
document.getElementById("msg").style.display="block";
explodeHeart();
}

/* center heart */

function explodeHeart(){

const heart=document.createElement("div");

heart.className="bigHeart";

heart.innerHTML="❤️";

document.body.appendChild(heart);

setTimeout(()=>heart.remove(),1000);

}

/* flowers */

function flower(){

for(let i=0;i<5;i++){

const f=document.createElement("div");

f.className="flower";

const arr=["🌹","🌷","🌸","💐"];

f.innerHTML=arr[Math.floor(Math.random()*arr.length)];

f.style.left=Math.random()*100+"vw";

document.body.appendChild(f);

setTimeout(()=>f.remove(),5000);

}

}

setInterval(flower,500);

/* hearts */

function hearts(){

for(let i=0;i<8;i++){

const h=document.createElement("div");

h.className="heart";

h.innerHTML="❤️";

h.style.left=Math.random()*100+"vw";

h.style.top="60vh";

document.body.appendChild(h);

setTimeout(()=>h.remove(),6000);

}

}

setInterval(hearts,500);

/* fireworks */

function firework(){

for(let i=0;i<40;i++){

const f=document.createElement("div");

f.className="fire";

f.style.left=Math.random()*100+"vw";

f.style.top="80vh";

document.body.appendChild(f);

setTimeout(()=>f.remove(),2000);

}

}

setInterval(firework,1500);

</script></body>
</html>
